name: Deploy Laravel to Staging via SSH

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, pdo_mysql, zip, bcmath, ctype, fileinfo, json, tokenizer, xml
          tools: composer

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Prepare deployment directories
        run: |
          mkdir -p deploy/app deploy/public
          rsync -av --exclude='public' --exclude='.git' --exclude='.github' --exclude='node_modules' --exclude='tests' --exclude='.env*' . deploy/app/
          rsync -av public/ deploy/public/

      - name: Setup SSH Agent and Known Hosts
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.CPANEL_SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.CPANEL_PORT }} -H ${{ secrets.CPANEL_HOST }} >> ~/.ssh/known_hosts
          
          # Modern Ubuntu runners disable ssh-rsa by default, which cPanel often requires.
          cat <<EOF > ~/.ssh/config
          Host *
            PubkeyAcceptedKeyTypes +ssh-rsa
            HostKeyAlgorithms +ssh-rsa
          EOF

      - name: Deploy App files to staging app folder
        run: |
          rsync -avz -e "ssh -vvv -p ${{ secrets.CPANEL_PORT }} -i ~/.ssh/id_rsa" deploy/app/ ${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_HOST }}:~/staging/

      - name: Deploy Public files to staging subdomain folder
        run: |
          rsync -avz -e "ssh -p ${{ secrets.CPANEL_PORT }} -i ~/.ssh/id_rsa" deploy/public/ ${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_HOST }}:~/staging_public_html/

      - name: Fix index.php, Create Storage Symlink & Set Permissions
        run: |
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.CPANEL_PORT }} ${{ secrets.CPANEL_USERNAME }}@${{ secrets.CPANEL_HOST }} "
            cd ~/staging_public_html

            # 1. Modify index.php to point to the 'staging' folder instead of standard paths
            sed -i \"s|require __DIR__.'/../vendor/autoload.php';|require __DIR__.'/../staging/vendor/autoload.php';|\" index.php
            sed -i \"s|require_once __DIR__.'/../bootstrap/app.php';|require_once __DIR__.'/../staging/bootstrap/app.php';|\" index.php

            # 2. Create symlink so storage is accessible publicly
            rm -rf storage
            ln -sfn ../staging/storage/app/public storage

            # 3. Set correct permissions for Laravel cache/logs
            chmod -R 755 ~/staging/bootstrap/cache ~/staging/storage

            # 4. Optional: Run migrations on staging (uncomment to enable)
            # cd ~/staging && php artisan migrate --force

            echo '✅ Deployment and post-configuration completed successfully!'
          "
